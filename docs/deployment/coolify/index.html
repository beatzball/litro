          <!--lit-part Xz8sqxsVnP4=--><p>Litro SSG builds can be deployed to <a href="https://coolify.io">Coolify</a> as a static site or via Docker.</p>
<h2 id="static-site-build-pack">Static Site Build Pack</h2>
<p>In your Coolify project:</p>
<ul>
<li><strong>Build command:</strong>
<pre><code class="language-bash">pnpm --filter @beatzball/litro-router build &#x26;&#x26; pnpm --filter @beatzball/litro build &#x26;&#x26; pnpm --filter @beatzball/litro-docs build
</code></pre>
</li>
<li><strong>Publish directory:</strong> <code>docs/dist/static</code></li>
<li><strong>Environment variables:</strong> Set <code>SITE_URL</code> to your domain.</li>
</ul>
<h2 id="docker">Docker</h2>
<p>Use the included <code>Dockerfile</code> + <code>nginx.conf</code> in <code>docs/</code>:</p>
<pre><code class="language-bash">docker build -f docs/Dockerfile -t litro-docs .
docker run -p 80:80 litro-docs
</code></pre>
<p>The Docker image:</p>
<ul>
<li>Builds the SSG output in a multi-stage Node.js build</li>
<li>Copies <code>dist/static/</code> to nginx</li>
<li>Configures clean-URL routing (directory index + try_files)</li>
<li>Sets 1-year immutable caching headers for <code>/_litro/</code> and <code>/shoelace/</code> assets</li>
</ul><!--/lit-part-->
