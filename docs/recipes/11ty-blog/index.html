          <!--lit-part 59xYQwXAKls=--><p>The <code>11ty-blog</code> recipe creates an SSG blog powered by the <code>litro:content</code> Markdown layer.</p>
<h2 id="scaffold">Scaffold</h2>
<pre><code class="language-bash">pnpm create @beatzball/litro my-blog
# choose: 11ty-blog
</code></pre>
<h2 id="structure">Structure</h2>
<pre><code>my-blog/
  content/
    blog/
      .11tydata.json
      first-post.md
  pages/
    index.ts          ← blog listing
    blog/
      [slug].ts       ← blog post
      tags/
        [tag].ts      ← tag listing
  public/
  app.ts
  nitro.config.ts     ← uses ssgPreset()
  vite.config.ts
</code></pre>
<h2 id="writing-posts">Writing Posts</h2>
<p>Create Markdown files in <code>content/blog/</code> with frontmatter:</p>
<pre><code class="language-md">---
title: My First Post
description: Getting started with the 11ty-blog recipe.
date: 2026-01-15
tags:
  - blog
  - announcement
---

# My First Post

Content here...
</code></pre>
<h2 id="build">Build</h2>
<pre><code class="language-bash">litro build
</code></pre>
<p>Output goes to <code>dist/static/</code>. Deploy to any static hosting (GitHub Pages, Netlify, Cloudflare Pages, etc.).</p><!--/lit-part-->
