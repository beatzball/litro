          <!--lit-part 8oJQzKmiztA=--><p>Litro supports SSG (static site generation) via Nitro's static preset. All routes are prerendered to <code>.html</code> files that can be served from any CDN.</p>
<h2 id="enable-ssg">Enable SSG</h2>
<p>Add <code>ssgPreset()</code> to your <code>nitro.config.ts</code>:</p>
<pre><code class="language-ts">import { ssgPreset } from '@beatzball/litro/config';

export default defineNitroConfig({
  ...ssgPreset(),
  // ...
});
</code></pre>
<p>Also add the <code>ssgPlugin</code> to the <code>build:before</code> hook:</p>
<pre><code class="language-ts">import ssgPlugin from '@beatzball/litro/plugins/ssg';

hooks: {
  'build:before': async (nitro) => {
    await contentPlugin(nitro);
    await pagesPlugin(nitro);
    await ssgPlugin(nitro);   // ← generates prerender routes
  },
},
</code></pre>
<h2 id="build">Build</h2>
<pre><code class="language-bash">litro build
</code></pre>
<p>Output goes to <code>dist/static/</code>. Each route produces a <code>.html</code> file.</p>
<h2 id="generateroutes"><code>generateRoutes()</code></h2>
<p>For dynamic routes (e.g. <code>pages/docs/[slug].ts</code>), export <code>generateRoutes()</code> to tell the SSG plugin which slugs to prerender:</p>
<pre><code class="language-ts">export async function generateRoutes(): Promise&#x3C;string[]> {
  const posts = await getPosts();
  return posts
    .filter(p => p.url.startsWith('/content/docs/'))
    .map(p => '/docs' + p.url.slice('/content/docs'.length));
}
</code></pre>
<h2 id="navigation-in-ssg">Navigation in SSG</h2>
<p>Use plain <code>&#x3C;a></code> tags for navigation in SSG sites. Each navigation fetches the prerendered HTML for that page. Do <strong>not</strong> use <code>&#x3C;litro-link></code> in SSG-only sites — the SPA router would navigate without fetching the prerendered page data.</p>
<h2 id="nojekyll"><code>.nojekyll</code></h2>
<p>If deploying to GitHub Pages, add a <code>.nojekyll</code> file to <code>public/</code>:</p>
<pre><code>public/.nojekyll
</code></pre>
<p>This prevents GitHub Pages from ignoring files with leading underscores.</p><!--/lit-part-->
