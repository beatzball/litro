name: Deploy Docs
on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "packages/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      # - name: Build litro-router
      #   run: pnpm --filter @beatzball/litro-router build
      #
      # - name: Build framework
      #   run: pnpm --filter @beatzball/litro build
      - name: Run Setup
        run: pnpm run setup
      - name: Prepare Builds
        run: pnpm run prepare:docs
      - name: Build docs site
        run: pnpm run build:docs
        env:
          LITRO_BASE_PATH: /
          SITE_URL: https://litro.dev

      # - name: Build docs site
      #   working-directory: docs
      #   run: node ../packages/framework/dist/cli/index.js build
      #   env:
      #     LITRO_BASE_PATH: /litro
      #     SITE_URL: https://beatzball.github.io/litro
      ## Trying this group ---
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./docs/dist/static"

      - name: Deploy to Github Pages
        id: deployment
        uses: actions/deploy-pages@v4
