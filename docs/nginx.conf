server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Clean URLs — try exact file, then directory index, then 404
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # 1-year immutable caching for content-hashed assets (/_litro/app.js uses stable name
    # but is controlled by us — acceptable tradeoff; a deploy always rewrites the file)
    location /_litro/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # 1-week caching for Shoelace icon assets (not content-hashed — don't use immutable)
    location /shoelace/ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    # No-cache for HTML pages
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Gzip
    gzip on;
    gzip_types text/html text/css application/javascript application/json image/svg+xml;
}
