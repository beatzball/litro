          <!--lit-part +gPy/lr0Chc=--><h2 id="prerequisites">Prerequisites</h2>
<ul>
<li>Node.js 20+</li>
<li>pnpm 9+</li>
</ul>
<h2 id="create-a-new-project">Create a New Project</h2>
<pre><code class="language-bash">pnpm create @beatzball/litro my-app
</code></pre>
<p>This launches the interactive scaffolding wizard. Choose a recipe:</p>
<ul>
<li><strong>fullstack</strong> — SSR app with API routes</li>
<li><strong>11ty-blog</strong> — Markdown blog with content layer</li>
<li><strong>starlight</strong> — Documentation site with sidebar + TOC</li>
</ul>
<h2 id="start-the-dev-server">Start the Dev Server</h2>
<pre><code class="language-bash">cd my-app
pnpm install
pnpm dev
</code></pre>
<p>The dev server starts on port 3000 (auto-increments if taken). Open <a href="http://localhost:3000">http://localhost:3000</a>.</p>
<h2 id="build-for-production">Build for Production</h2>
<pre><code class="language-bash">pnpm build
</code></pre>
<p>Output:</p>
<ul>
<li><code>dist/client/</code> — Vite-built client bundle</li>
<li><code>dist/server/</code> — Nitro server bundle (SSR mode) or <code>dist/static/</code> (SSG mode)</li>
</ul>
<h2 id="preview-the-production-build">Preview the Production Build</h2>
<pre><code class="language-bash">pnpm preview
</code></pre>
<p>Serves the production build locally. For SSG output, serves from <code>dist/static/</code>. For SSR, starts the Nitro server from <code>dist/server/server/index.mjs</code>.</p><!--/lit-part-->
