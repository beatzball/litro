          <!--lit-part PgUf7N8V/6I=--><h2 id="definepagedata"><code>definePageData</code></h2>
<p>Export a <code>pageData</code> constant using <code>definePageData</code> to fetch data server-side before the page renders:</p>
<pre><code class="language-ts">import { definePageData } from '@beatzball/litro';

export const pageData = definePageData(async (event) => {
  const slug = event.context.params?.slug ?? '';
  const post = await fetchPostBySlug(slug);
  return { post };
});
</code></pre>
<p>The <code>event</code> parameter is an H3 <code>H3Event</code>. You can read URL params, headers, cookies, and request bodies.</p>
<h2 id="how-data-flows">How Data Flows</h2>
<ol>
<li>The page handler calls <code>pageData.fetcher(event)</code> before rendering.</li>
<li>The result is JSON-serialized and injected into the HTML as <code>&#x3C;script type="application/json" id="__litro_data__"></code>.</li>
<li>During SSR, the data is passed as a <code>.serverData</code> property on the component so <code>render()</code> sees the real data immediately.</li>
<li>On the client, the router reads the JSON from the DOM on first load and sets <code>this.serverData</code> on the component instance before mounting.</li>
</ol>
<h2 id="reading-server-data">Reading Server Data</h2>
<p>Access server data via <code>this.serverData</code> in your component:</p>
<pre><code class="language-ts">@customElement('page-blog-slug')
export class BlogSlugPage extends LitroPage {
  override render() {
    const data = this.serverData as { post: Post } | null;
    if (!data) return html`&#x3C;p>Loading...&#x3C;/p>`;
    return html`&#x3C;h1>${data.post.title}&#x3C;/h1>`;
  }
}
</code></pre>
<h2 id="error-handling">Error Handling</h2>
<p>Throw an H3 error to return a 404 or other error status:</p>
<pre><code class="language-ts">import { createError } from 'h3';

export const pageData = definePageData(async (event) => {
  const slug = event.context.params?.slug ?? '';
  const post = await fetchPost(slug);
  if (!post) throw createError({ statusCode: 404, message: 'Post not found' });
  return post;
});
</code></pre><!--/lit-part-->
