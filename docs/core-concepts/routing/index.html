          <!--lit-part lJ9KZKIvfaU=--><h2 id="file-system-routing">File-System Routing</h2>
<p>Litro uses the <code>pages/</code> directory for routing. Filenames map to URL paths:</p>
<table>
<thead>
<tr>
<th>File</th>
<th>Route</th>
</tr>
</thead>
<tbody>
<tr>
<td><code>pages/index.ts</code></td>
<td><code>/</code></td>
</tr>
<tr>
<td><code>pages/about.ts</code></td>
<td><code>/about</code></td>
</tr>
<tr>
<td><code>pages/blog/index.ts</code></td>
<td><code>/blog</code></td>
</tr>
<tr>
<td><code>pages/blog/[slug].ts</code></td>
<td><code>/blog/:slug</code></td>
</tr>
<tr>
<td><code>pages/[...all].ts</code></td>
<td><code>/*</code> (catch-all)</td>
</tr>
</tbody>
</table>
<h2 id="page-components">Page Components</h2>
<p>Each page file exports a <strong>default</strong> Lit component class decorated with <code>@customElement</code>:</p>
<pre><code class="language-ts">import { html } from 'lit';
import { customElement } from 'lit/decorators.js';
import { LitroPage } from '@beatzball/litro/runtime';

@customElement('page-about')
export class AboutPage extends LitroPage {
  override render() {
    return html`&#x3C;h1>About&#x3C;/h1>`;
  }
}

export default AboutPage;
</code></pre>
<h2 id="route-parameters">Route Parameters</h2>
<p>Dynamic segments are available in <code>definePageData</code> via <code>event.context.params</code>:</p>
<pre><code class="language-ts">export const pageData = definePageData(async (event) => {
  const slug = event.context.params?.slug ?? '';
  // ...
});
</code></pre>
<p>On the client side, <code>onBeforeEnter(location)</code> receives the parsed route parameters:</p>
<pre><code class="language-ts">override onBeforeEnter(location: LitroLocation) {
  this._slug = location.params.slug ?? '';
}
</code></pre>
<h2 id="route-metadata">Route Metadata</h2>
<p>Export a <code>routeMeta</code> object to control the page's <code>&#x3C;title></code> and inject extra <code>&#x3C;head></code> HTML:</p>
<pre><code class="language-ts">export const routeMeta = {
  title: 'About — My Site',
  head: '&#x3C;meta name="description" content="About page" />',
};
</code></pre><!--/lit-part-->
