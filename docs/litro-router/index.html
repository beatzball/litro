          <!--lit-part sBTwpfvGw0Y=--><p><code>LitroRouter</code> is Litro's built-in client-side router. It lives in the <code>@beatzball/litro-router</code> package and uses the native URLPattern API.</p>
<h2 id="setroutesroutes"><code>setRoutes(routes)</code></h2>
<p>Configure the router with an array of route descriptors. Called internally by <code>&#x3C;litro-outlet></code>.</p>
<h2 id="gopath"><code>go(path)</code></h2>
<p>Navigate to a path programmatically:</p>
<pre><code class="language-ts">import { LitroRouter } from '@beatzball/litro-router';

LitroRouter.go('/docs/getting-started');
</code></pre>
<h2 id="x3clitro-outlet"><code>&#x3C;litro-outlet></code></h2>
<p>The page mount point. Place it in your HTML shell (managed automatically by the framework). The router renders the matched page component inside this element.</p>
<h2 id="x3clitro-link"><code>&#x3C;litro-link></code></h2>
<p>A custom element for SPA navigation. Renders an <code>&#x3C;a></code> tag inside a Shadow DOM for progressive enhancement and accessibility.</p>
<pre><code class="language-html">&#x3C;litro-link href="/docs/getting-started">Getting Started&#x3C;/litro-link>
&#x3C;litro-link href="/blog" target="_blank">Blog&#x3C;/litro-link>
</code></pre>
<h2 id="litropage"><code>LitroPage</code></h2>
<p>Base class for page components. Provides <code>onBeforeEnter</code> and <code>serverData</code>:</p>
<pre><code class="language-ts">import { LitroPage } from '@beatzball/litro/runtime';
import type { LitroLocation } from '@beatzball/litro-router';

@customElement('page-profile')
export class ProfilePage extends LitroPage {
  _userId = '';

  override onBeforeEnter(location: LitroLocation) {
    this._userId = location.params.id ?? '';
  }

  override render() {
    const data = this.serverData as { user: User } | null;
    return html`&#x3C;h1>${data?.user.name}&#x3C;/h1>`;
  }
}
</code></pre>
<h2 id="litrolocation"><code>LitroLocation</code></h2>
<pre><code class="language-ts">interface LitroLocation {
  pathname: string;
  params: Record&#x3C;string, string>;
  search: string;
  hash: string;
}
</code></pre><!--/lit-part-->
