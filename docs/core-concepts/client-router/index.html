s to <code>prerender.routes</code> explicitly. Litro's SSG plugin handles this via <code>generateRoutes()</code> exports on page files.</p>","rawBody":"\n# Client-Side Router\n\nLitro ships a built-in client-side router (`LitroRouter`) built on the native [URLPattern API](https://developer.mozilla.org/en-US/docs/Web/API/URLPattern). No external router dependency.\n\n## Navigation\n\nUse `<litro-link>` for SPA navigation. Plain `<a>` tags cause full page reloads:\n\n```html\n<!-- SPA navigation — no full reload -->\n<litro-link href=\"/docs/getting-started\">Getting Started</litro-link>\n\n<!-- Full page reload (browser default) -->\n<a href=\"/docs/getting-started\">Getting Started</a>\n```\n\n## Programmatic Navigation\n\n```ts\nimport { LitroRouter } from '@beatzball/litro-router';\n\nLitroRouter.go('/docs/getting-started');\n```\n\n## Route Parameters\n\nThe router passes parsed parameters to `onBeforeEnter`:\n\n```ts\n@customElement('page-blog-slug')\nexport class BlogSlugPage extends LitroPage {\n  _slug = '';\n\n  override onBeforeEnter(location: LitroLocation) {\n    this._slug = location.params.slug ?? '';\n  }\n\n  override render() {\n    return html`<p>Slug: ${this._slug}</p>`;\n  }\n}\n```\n\n## Hash Navigation\n\nThe router handles `popstate` events from fragment links (#hash). It automatically scrolls to the target heading after mount, traversing shadow DOM roots to find the element.\n\n## SSG and the Router\n\nThe `crawlLinks` option does **not** find `LitroRouter` routes automatically. Add all static page routes to `prerender.routes` explicitly. Litro's SSG plugin handles this via `generateRoutes()` exports on page files.\n","url":"/content/docs/core-concepts/client-router","frontmatter":{"title":"Client-Side Router","description":"LitroRouter is Litro's built-in client router using the native URLPattern API. No external dependency.","date":"2026-01-01T00:00:00.000Z"}},"body":"<p>Litro ships a built-in client-side router (<code>LitroRouter</code>) bu           <!--lit-part mQIaXo3SSxQ=--><p>Litro ships a built-in client-side router (<code>LitroRouter</code>) built on the native <a href="https://developer.mozilla.org/en-US/docs/Web/API/URLPattern">URLPattern API</a>. No external router dependency.</p>
<h2 id="navigation">Navigation</h2>
<p>Use <code>&#x3C;litro-link></code> for SPA navigation. Plain <code>&#x3C;a></code> tags cause full page reloads:</p>
<pre><code class="language-html">&#x3C;!-- SPA navigation — no full reload -->
&#x3C;litro-link href="/docs/getting-started">Getting Started&#x3C;/litro-link>

&#x3C;!-- Full page reload (browser default) -->
&#x3C;a href="/docs/getting-started">Getting Started&#x3C;/a>
</code></pre>
<h2 id="programmatic-navigation">Programmatic Navigation</h2>
<pre><code class="language-ts">import { LitroRouter } from '@beatzball/litro-router';

LitroRouter.go('/docs/getting-started');
</code></pre>
<h2 id="route-parameters">Route Parameters</h2>
<p>The router passes parsed parameters to <code>onBeforeEnter</code>:</p>
<pre><code class="language-ts">@customElement('page-blog-slug')
export class BlogSlugPage extends LitroPage {
  _slug = '';

  override onBeforeEnter(location: LitroLocation) {
    this._slug = location.params.slug ?? '';
  }

  override render() {
    return html`&#x3C;p>Slug: ${this._slug}&#x3C;/p>`;
  }
}
</code></pre>
<h2 id="hash-navigation">Hash Navigation</h2>
<p>The router handles <code>popstate</code> events from fragment links (#hash). It automatically scrolls to the target heading after mount, traversing shadow DOM roots to find the element.</p>
<h2 id="ssg-and-the-router">SSG and the Router</h2>
<p>The <code>crawlLinks</code> option does <strong>not</strong> find <code>LitroRouter</code> routes automatically. Add all static page routes to <code>prerender.routes</code> explicitly. Litro's SSG plugin handles this via <code>generateRoutes()</code> exports on page files.</p><!--/lit-part-->
