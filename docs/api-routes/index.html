          <!--lit-part SFnVwK1LfCE=--><p>API routes are standard Nitro/H3 event handlers placed in <code>server/api/</code>. No Lit involved.</p>
<h2 id="creating-an-api-route">Creating an API Route</h2>
<pre><code class="language-ts">// server/api/hello.ts
import { defineEventHandler } from 'h3';

export default defineEventHandler((event) => {
  return { message: 'Hello from the API', timestamp: Date.now() };
});
</code></pre>
<p>This file is automatically registered at <code>/api/hello</code> by Nitro's route scanner.</p>
<h2 id="http-methods">HTTP Methods</h2>
<p>Use filename suffixes for method-specific handlers:</p>
<pre><code>server/api/
  posts.get.ts     → GET /api/posts
  posts.post.ts    → POST /api/posts
  posts/[id].ts    → /api/posts/:id (all methods)
</code></pre>
<h2 id="reading-request-data">Reading Request Data</h2>
<pre><code class="language-ts">import { defineEventHandler, readBody, getQuery } from 'h3';

export default defineEventHandler(async (event) => {
  const query = getQuery(event);
  const body = await readBody(event);
  return { query, body };
});
</code></pre>
<h2 id="error-responses">Error Responses</h2>
<pre><code class="language-ts">import { defineEventHandler, createError } from 'h3';

export default defineEventHandler((event) => {
  const id = event.context.params?.id;
  if (!id) throw createError({ statusCode: 400, message: 'Missing id' });
  // ...
});
</code></pre><!--/lit-part-->
