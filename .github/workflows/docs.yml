name: Deploy Docs
on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'packages/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build litro-router
        run: pnpm --filter @beatzball/litro-router build

      - name: Build framework
        run: pnpm --filter @beatzball/litro build

      - name: Build docs site
        working-directory: docs
        run: node ../packages/framework/dist/cli/index.js build
        env:
          LITRO_BASE_PATH: /litro
          SITE_URL: https://beatzball.github.io/litro

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs/dist/static
