          <!--lit-part mnkEIFm7yI4=--><p>The <code>starlight</code> recipe creates a documentation site inspired by Astro Starlight. It includes a sidebar, table of contents, prev/next navigation, and a blog.</p>
<h2 id="scaffold">Scaffold</h2>
<pre><code class="language-bash">pnpm create @beatzball/litro my-docs
# choose: starlight
</code></pre>
<h2 id="structure">Structure</h2>
<pre><code>my-docs/
  content/
    docs/
      getting-started.md
      configuration.md
    blog/
      welcome.md
  pages/
    index.ts              ← splash/home
    docs/[slug].ts        ← doc article
    blog/index.ts         ← blog listing
    blog/[slug].ts        ← blog post
    blog/tags/[tag].ts    ← tag listing
  src/
    components/           ← layout + UI components
  server/
    starlight.config.js   ← nav, sidebar, edit URL
  public/
    styles/starlight.css
  app.ts
  nitro.config.ts         ← uses ssgPreset()
  vite.config.ts
</code></pre>
<h2 id="sidebar-configuration">Sidebar Configuration</h2>
<p>Edit <code>server/starlight.config.js</code> to configure sidebar groups:</p>
<pre><code class="language-js">export const siteConfig = {
  title: 'My Docs',
  sidebar: [
    {
      label: 'Getting Started',
      items: [
        { label: 'Introduction', slug: 'introduction' },
        { label: 'Installation', slug: 'installation' },
      ],
    },
  ],
  editUrlBase: 'https://github.com/you/repo/edit/main/docs',
};
</code></pre>
<h2 id="shoelace-integration">Shoelace Integration</h2>
<p>The recipe includes Shoelace web components for enhanced UI elements (buttons, badges, copy buttons). Use Shoelace components directly in your Markdown via custom HTML, or in page components:</p>
<pre><code class="language-html">&#x3C;sl-button variant="primary">Get Started&#x3C;/sl-button>
&#x3C;sl-copy-button value="pnpm create @beatzball/litro my-app">&#x3C;/sl-copy-button>
</code></pre><!--/lit-part-->
