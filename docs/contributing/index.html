          <!--lit-part H2m7AnaWFCM=--><h2 id="prerequisites">Prerequisites</h2>
<ul>
<li>Node.js 20+</li>
<li>pnpm 9+</li>
</ul>
<h2 id="setup">Setup</h2>
<pre><code class="language-bash">git clone https://github.com/beatzball/litro.git
cd litro
pnpm install
</code></pre>
<h2 id="build-packages">Build Packages</h2>
<pre><code class="language-bash">pnpm --filter @beatzball/litro-router build
pnpm --filter @beatzball/litro build
</code></pre>
<h2 id="running-tests">Running Tests</h2>
<pre><code class="language-bash"># Unit tests
pnpm --filter @beatzball/litro-router test
pnpm --filter @beatzball/litro test
pnpm --filter @beatzball/create-litro test

# E2E tests (dev mode)
pnpm test:e2e
</code></pre>
<h2 id="project-structure">Project Structure</h2>
<pre><code>litro/
  packages/
    framework/          ← @beatzball/litro (core)
    litro-router/       ← @beatzball/litro-router
    create-litro/       ← npm create @beatzball/litro
  playground/           ← fullstack recipe dev environment
  playground-11ty/      ← 11ty-blog recipe dev environment
  playground-starlight/ ← starlight recipe dev environment
  docs/                 ← this documentation site
  e2e/                  ← Playwright e2e tests
  research/             ← design research documents
</code></pre>
<h2 id="submitting-a-pr">Submitting a PR</h2>
<ol>
<li>Fork the repository.</li>
<li>Create a branch: <code>git checkout -b feat/my-feature</code></li>
<li>Make changes and add tests.</li>
<li>Run <code>pnpm --filter @beatzball/litro test</code> to verify.</li>
<li>Submit a pull request to <code>main</code>.</li>
</ol>
<h2 id="release-workflow">Release Workflow</h2>
<p>Releases use <a href="https://github.com/changesets/changesets">Changesets</a>. Add a changeset with <code>pnpm changeset</code>, then open a PR. The CI workflow bumps versions and publishes to npm when the changeset PR is merged.</p><!--/lit-part-->
