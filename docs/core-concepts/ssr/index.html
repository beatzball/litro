    DSD polyfill — required for ~4% of browsers (pre-Firefox 119, pre-Safari 16.4)
    that do not natively support Declarative Shadow DOM (shadowrootmode attribute).
    Must be a plain synchronous inline <script> — a type="module" script is deferred
    by the browser and arrives after the parser has already processed the DSD templates,
    making it too late to upgrade them.
  -->

          <!--lit-part 6kpmkvTmCVY=--><p>Litro uses <code>@lit-labs/ssr</code> to render Lit components on the server using <strong>Declarative Shadow DOM</strong> (DSD). DSD is a browser-native way to express shadow roots in HTML — no JavaScript required to parse the initial structure.</p>
<h2 id="how-it-works">How It Works</h2>
<ol>
<li>The page handler imports the page component module (compiled into the server bundle by Rollup).</li>
<li><code>@lit-labs/ssr</code> renders the component to an async iterable of HTML strings.</li>
<li>The HTML is streamed in three parts: shell head → DSD output → shell foot.</li>
<li>The browser parses the DSD HTML and constructs the shadow trees natively.</li>
<li><code>@lit-labs/ssr-client</code> hydrates the component, attaching event listeners and making it interactive.</li>
</ol>
<h2 id="streaming">Streaming</h2>
<p>The SSR output streams directly to the browser as it's generated. This means the browser can start parsing and rendering the top of the page before the server finishes rendering the bottom.</p>
<h2 id="hydration">Hydration</h2>
<p>Add <code>@lit-labs/ssr-client/lit-element-hydrate-support.js</code> as the <strong>first import</strong> in your <code>app.ts</code>. This patches <code>LitElement</code> to support DSD hydration:</p>
<pre><code class="language-ts">// app.ts
import '@lit-labs/ssr-client/lit-element-hydrate-support.js'; // MUST be first
import '@beatzball/litro/runtime/LitroOutlet.js';
// ...
</code></pre>
<h2 id="ssr-safety">SSR Safety</h2>
<p>Components that access <code>window</code>, <code>document</code>, or <code>localStorage</code> at <strong>module evaluation time</strong> will throw during SSR. Guard such access:</p>
<pre><code class="language-ts">// Safe — only runs in the browser
override firstUpdated() {
  if (typeof localStorage !== 'undefined') {
    this._theme = localStorage.getItem('theme') ?? 'light';
  }
}
</code></pre>
<p>For components that can't be made SSR-safe, use <code>&#x3C;litro-client-only></code> to skip SSR entirely.</p><!--/lit-part-->
