          <!--lit-part lhSpHp8t8Og=--><p>Deploy your Litro SSG site to GitHub Pages using the included GitHub Actions workflow.</p>
<h2 id="setup">Setup</h2>
<ol>
<li>
<p>Enable GitHub Pages in your repository settings (Settings → Pages → Source: GitHub Actions).</p>
</li>
<li>
<p>Add <code>.nojekyll</code> to your <code>public/</code> directory to prevent Jekyll from filtering files with leading underscores.</p>
</li>
<li>
<p>Add the deployment workflow (<code>.github/workflows/docs.yml</code>):</p>
</li>
</ol>
<pre><code class="language-yaml">name: Deploy Docs
on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install
      - run: pnpm --filter @beatzball/litro-router build
      - run: pnpm --filter @beatzball/litro build
      - run: pnpm --filter @beatzball/litro-docs build
        env:
          LITRO_BASE_PATH: /litro
          SITE_URL: https://beatzball.github.io/litro
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs/dist/static
</code></pre>
<h2 id="custom-domain">Custom Domain</h2>
<p>If using a custom domain (e.g. <code>litro.dev</code> served at <code>/</code>):</p>
<ol>
<li>Remove <code>LITRO_BASE_PATH</code> from the workflow env.</li>
<li>Update <code>SITE_URL</code> to your domain.</li>
<li>Add a <code>CNAME</code> file to <code>docs/public/</code> with your domain name.</li>
</ol>
<p>No other code changes needed — <code>LITRO_BASE_PATH</code> defaults to <code>''</code> and the asset paths resolve correctly.</p>
<h2 id="important-notes">Important Notes</h2>
<ul>
<li><code>dist/static/.nojekyll</code> must be present for GitHub Pages to serve <code>_litro/</code> assets (underscore prefix).</li>
<li>The <code>LITRO_BASE_PATH=/litro</code> env var prefixes the <code>/_litro/app.js</code> script URL to <code>/litro/_litro/app.js</code>, matching the GitHub Pages project site sub-path.</li>
</ul><!--/lit-part-->
