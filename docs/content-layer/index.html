          <!--lit-part yuqRIG2o95s=--><p>The <code>litro:content</code> virtual module provides a server-side Markdown content API. It is compatible with 11ty's data cascade and frontmatter conventions.</p>
<h2 id="directory-structure">Directory Structure</h2>
<pre><code>content/
  docs/
    .11tydata.json      ← { "tags": ["docs"] }
    getting-started.md
    api-routes.md
  blog/
    .11tydata.json      ← { "tags": ["blog"] }
    first-post.md
  _data/
    metadata.js         ← global data
</code></pre>
<h2 id="api">API</h2>
<pre><code class="language-ts">import { getPosts, getPost, getTags, getGlobalData } from 'litro:content';
</code></pre>
<h3 id="getpostsfilter"><code>getPosts(filter?)</code></h3>
<p>Returns all posts, optionally filtered by tag or other criteria:</p>
<pre><code class="language-ts">const posts = await getPosts();
const blogPosts = await getPosts({ tags: ['blog'] });
const docPages = await getPosts({ tags: ['docs'] });
</code></pre>
<h3 id="getposturl"><code>getPost(url)</code></h3>
<p>Returns a single post by its URL:</p>
<pre><code class="language-ts">const post = await getPost('/content/docs/getting-started');
</code></pre>
<h3 id="gettags"><code>getTags()</code></h3>
<p>Returns all unique tags across all posts.</p>
<h3 id="getglobaldata"><code>getGlobalData()</code></h3>
<p>Returns the merged global data from <code>_data/</code> files.</p>
<h2 id="frontmatter">Frontmatter</h2>
<p>Each Markdown file can include YAML frontmatter:</p>
<pre><code class="language-md">---
title: My Post
description: A brief summary.
date: 2026-01-01
tags:
  - blog
  - announcement
---

# My Post

Content here...
</code></pre>
<h2 id="post-shape">Post Shape</h2>
<pre><code class="language-ts">interface Post {
  title: string;
  description?: string;
  date?: string;
  tags: string[];
  url: string;       // e.g. /content/docs/getting-started
  body: string;      // rendered HTML
  rawBody: string;   // raw Markdown
}
</code></pre>
<h2 id="ssg-generateroutes">SSG + generateRoutes</h2>
<p>For SSG, export <code>generateRoutes()</code> from your page file to tell the SSG plugin which dynamic routes to prerender:</p>
<pre><code class="language-ts">export async function generateRoutes(): Promise&#x3C;string[]> {
  const posts = await getPosts({ tags: ['docs'] });
  return posts.map(p => '/docs' + p.url.slice('/content/docs'.length));
}
</code></pre><!--/lit-part-->
