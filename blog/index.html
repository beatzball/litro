  <script type="application/json" id="__litro_data__">{"posts":[{"slug":"welcome","title":"Welcome to Litro","date":"2026-01-01T00:00:00.000Z","description":"Introducing Litro — a fullstack web framework built on Lit, Nitro, and Vite.","tags":["blog","announcement"],"draft":false,"body":"<h1>Welcome to Litro</h1>\n<p>We're excited to introduce <strong>Litro</strong> — a fullstack web framework that combines the best of:</p>\n<ul>\n<li><strong>Lit</strong> — web components, no VDOM, no proprietary runtime</li>\n<li><strong>Nitro</strong> — battle-tested server engine (the same one powering Nuxt)</li>\n<li><strong>Vite</strong> — fast HMR and modern bundling</li>\n</ul>\n<p>Litro brings these together with a seamless developer experience: file-system routing, streaming SSR, a built-in client router, and an optional content layer for Markdown-driven sites.</p>\n<h2>What Makes Litro Different</h2>\n<p>Most frameworks bundle their component model and server into a single tightly-coupled system. Litro keeps them separate but integrated:</p>\n<ul>\n<li>Your components are standard web components — they work with or without the Litro server.</li>\n<li>The server is Nitro — you get every Nitro deployment adapter out of the box.</li>\n<li>SSR uses the W3C Declarative Shadow DOM spec, not a custom serialization format.</li>\n</ul>\n<h2>Get Started</h2>\n<pre><code class=\"language-bash\">pnpm create @beatzball/litro my-app\n</code></pre>\n<p>Check out the <a href=\"/docs/getting-started\">Getting Started</a> guide for a full walkthrough.</p>","rawBody":"\n# Welcome to Litro\n\nWe're excited to introduce **Litro** — a fullstack web framework that combines the best of:\n\n- **Lit** — web components, no VDOM, no proprietary runtime\n- **Nitro** — battle-tested server engine (the same one powering Nuxt)\n- **Vite** — fast HMR and modern bundling\n\nLitro brings these together with a seamless developer experience: file-system routing, streaming SSR, a built-in client router, and an optional content layer for Markdown-driven sites.\n\n## What Makes Litro Different\n\nMost frameworks bundle their component model and server into a single tightly-coupled system. Litro keeps them separate but integrated:\n\n- Your components are standard web components — they work with or without the Litro server.\n- The server is Nitro — you get every Nitro deployment adapter out of the box.\n- SSR uses the W3C Declarative Shadow DOM spec, not a custom serialization format.\n\n## Get Started\n\n```bash\npnpm create @beatzball/litro my-app\n```\n\nCheck out the [Getting Started](/docs/getting-started) guide for a full walkthrough.\n","url":"/content/blog/welcome","frontmatter":{"tags":["blog","announcement"],"layout":"blog","title":"Welcome to Litro","description":"Introducing Litro — a fullstack web framework built on Lit, Nitro, and Vite.","date":"2026-01-01T00:00:00.000Z"}}],"siteTitle":"Litro","nav":[{"label":"Docs","href":"/docs/introduction"},{"label":"Blog","href":"/blog"},{"label":"GitHub","href":"https://github.com/beatzball/litro"}]}</script>
