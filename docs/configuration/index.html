          <!--lit-part hkJqXox1uMU=--><h2 id="nitroconfigts"><code>nitro.config.ts</code></h2>
<p>Litro projects configure the server via <code>nitro.config.ts</code>. This is a standard Nitro config with Litro plugins.</p>
<pre><code class="language-ts">import { defineNitroConfig } from 'nitropack/config';
import { ssgPreset } from '@beatzball/litro/config';
import pagesPlugin from '@beatzball/litro/plugins';
import ssgPlugin from '@beatzball/litro/plugins/ssg';
import contentPlugin from '@beatzball/litro/content/plugin';

export default defineNitroConfig({
  ...ssgPreset(), // enables SSG output

  srcDir: 'server',

  publicAssets: [
    { dir: '../dist/client', baseURL: '/_litro/', maxAge: 31536000 },
    { dir: '../public',      baseURL: '/',        maxAge: 0 },
  ],

  hooks: {
    'build:before': async (nitro) => {
      await contentPlugin(nitro); // content layer
      await pagesPlugin(nitro);   // page scanner
      await ssgPlugin(nitro);     // static route generation
    },
  },
});
</code></pre>
<h2 id="viteconfigts"><code>vite.config.ts</code></h2>
<p>Standard Vite config. The <code>litroContentPlugin()</code> bridges the <code>litro:content</code> virtual module for the client bundle (returns a browser stub — real data is server-side only).</p>
<pre><code class="language-ts">import { defineConfig } from 'vite';
import litroContentPlugin from '@beatzball/litro/vite';

export default defineConfig({
  plugins: [litroContentPlugin()],
  base: '/_litro/',
  build: {
    outDir: 'dist/client',
    rollupOptions: {
      input: 'app.ts',
      output: { entryFileNames: '[name].js' },
    },
  },
});
</code></pre>

<td><code>LITRO_BASE_PATH</code></td>
<td>Sub-path prefix for GitHub Pages project sites (e.g. <code>/litro</code>)</td>
<td><code>''</code></td>
</tr>
<tr>
<td><code>SITE_URL</code></td>
<td>Canonical base URL for SEO meta tags</td>
<td><code>https://litro.dev</code></td>
</tr>
