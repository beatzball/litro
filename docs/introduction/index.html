          <!--lit-part on9o5nJGT+A=--><p>Litro is a greenfield fullstack web framework built on three pillars:</p>
<ul>
<li><strong>Lit</strong> — the only component model. Write UI as standard web components using <code>LitElement</code>.</li>
<li><strong>Nitro</strong> — the server engine (same server powering Nuxt). Handles routing, API routes, SSR, and deployment adapters.</li>
<li><strong>Vite</strong> — client-side bundling and HMR during development.</li>
</ul>
<h2 id="why-litro">Why Litro?</h2>
<p>Most frameworks lock you into a proprietary component model and a tightly coupled server layer. Litro is different:</p>
<ul>
<li>Components are standard web components — they work anywhere the browser does.</li>
<li>The server is Nitro — you get access to every Nitro deployment adapter (Node.js, Cloudflare Workers, Vercel Edge, and more) without any additional configuration.</li>
<li>SSR uses <code>@lit-labs/ssr</code> and Declarative Shadow DOM — fully spec-compliant, no VDOM required.</li>
</ul>
<h2 id="architecture">Architecture</h2>
<pre><code>User Request
    │
    ▼
Nitro Server
    ├── /api/**  →  server/api/ route files (plain H3 handlers)
    └── /**      →  Page Handler
                        ├── SSR: @lit-labs/ssr streams DSD HTML
                        │     └── client: hydrates → LitroRouter takes over
                        └── SSG: prerendered .html served statically
</code></pre>
<h2 id="what-you-get">What You Get</h2>
<ul>
<li>File-system routing (pages/ directory → URL)</li>
<li>SSR with streaming Declarative Shadow DOM</li>
<li><code>definePageData</code> for server-side data fetching</li>
<li>Built-in client-side router (<code>LitroRouter</code>) using the URLPattern API</li>
<li>Content layer for Markdown (11ty-compatible)</li>
<li>SSG (static site generation) via the <code>ssgPreset</code></li>
<li>Recipes for common project types (fullstack, 11ty blog, Starlight docs)</li>
</ul><!--/lit-part-->
